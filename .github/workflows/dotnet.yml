# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test (.NET)
      run: dotnet test --no-build --verbosity normal
    - name: Install frontend dependencies
      run: npm ci
      working-directory: TrashAnimal.Web
    - name: Start backend API
      run: dotnet run --project TrashAnimal.Api &
      env:
        ASPNETCORE_ENVIRONMENT: Development
        ASPNETCORE_URLS: http://localhost:5080
    - name: Wait for API to be ready
      run: |
        timeout 30 bash -c 'until curl -f http://localhost:5080/health 2>/dev/null; do sleep 1; done' || \
        timeout 30 bash -c 'until nc -z localhost 5080 2>/dev/null; do sleep 1; done'
    - name: Test (frontend - unit + integration + ui)
      run: npm run test:run
      working-directory: TrashAnimal.Web
      env:
        VITE_API_BASE_URL: http://localhost:5080
